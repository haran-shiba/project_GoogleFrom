<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>検索フォームUI模写 練習デモ（学習目的・Googleとは無関係）</title>
</head>
<body>
    <div style="position:fixed;top:0;left:0;width:100%;z-index:9999;background:#ffcc00;color:#111;text-align:center;padding:6px 10px;font-size:13px;font-weight:bold;">
        ⚠ これは学習目的で作成したUI模写のデモページです。Google LLCとは一切関係ありません。
    </div>

    <main class="page">
        <h1 class="logo">Google<span style="font-size:16px;font-weight:400;vertical-align:middle;margin-left:10px;color:#fff;">（練習用模写）</span></h1>

        <form id="search-form" class="search-bar">
            <i class="fa-solid fa-magnifying-glass icon"></i>
            <input type="text" id="search-input" placeholder="Google で検索または URL を入力" autocomplete="off">
            <button type="button" class="icon-btn" data-tooltip="音声検索"><i class="fa-solid fa-microphone"></i></button>
            <button type="button" class="icon-btn" data-tooltip="画像で検索"><i class="fa-solid fa-camera"></i></button>
            <button type="button" class="ai-mode-btn" id="ai-mode-btn">✨ AI モード</button>
        </form>

        <div class="shortcuts" id="shortcuts">
            <div class="shortcut-item" id="add-shortcut-btn">
                <div class="shortcut-icon add-icon">+</div>
                <span>ショートカット...</span>
            </div>
        </div>
    </main>

    <div class="modal-overlay hidden" id="shortcut-modal">
        <div class="modal-box">
            <h2 class="modal-title">ショートカットを追加</h2>

            <label class="modal-label" for="shortcut-name-input">名前</label>
            <input type="text" id="shortcut-name-input" class="modal-input">

            <label class="modal-label" for="shortcut-url-input">URL</label>
            <input type="text" id="shortcut-url-input" class="modal-input">

            <div class="modal-actions">
                <button type="button" class="modal-btn cancel-btn" id="cancel-btn">キャンセル</button>
                <button type="button" class="modal-btn done-btn" id="done-btn" disabled>完了</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
